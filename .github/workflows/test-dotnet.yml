name: .NET CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0

      - name: Restore dependencies
        run: dotnet restore HarpagonApp.sln

      - name: Build project
        run: dotnet build HarpagonApp.sln --no-restore

      - name: Run tests
        run: dotnet test HarpagonApp.sln --no-build --verbosity normal